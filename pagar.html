<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finalizar Pedido - Dolce Tropea</title>

<link rel="stylesheet" href="styles_2.css">

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Roboto, Arial, sans-serif;
    background: #0f0f12;
    color: #eaeaea;
}

.pago-body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1a1a1a, #0f0f12 70%);
    padding: 20px;
}

.pago-card {
    width: 100%;
    max-width: 480px;
    background: #1b1b1f;
    border-radius: 18px;
    padding: 25px;
    border: 1px solid rgba(255,255,255,0.05);
}

.pago-titulo {
    text-align: center;
    font-size: 28px;
    font-weight: 800;
}

.pago-subtitulo {
    text-align: center;
    color: #b5b5b5;
}

.resumen-caja {
    background: #141418;
    padding: 15px;
    border-radius: 12px;
    margin: 15px 0;
}

.badge-pedido {
    background: linear-gradient(135deg,#c8a24a,#f5d27a);
    color: #1a1a1a;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: bold;
}

.total-monto {
    font-size: 26px;
    font-weight: 900;
}

.metodos-lista {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.metodo-item {
    background: #15151a;
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.08);
}

.metodo-item:hover {
    border-color: #c8a24a;
    transform: scale(1.02);
}

.info-pago-dinamica {
    margin-top: 15px;
}

.datos-banco {
    background: #111114;
    padding: 15px;
    border-radius: 12px;
    border: 1px dashed rgba(255,255,255,0.15);
}

.btn-copiar {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg,#c8a24a,#f5d27a);
    font-weight: bold;
    cursor: pointer;
}

/* BOTONES */
.btn-paso1,
.btn-paso2 {
    width: 100%;
    margin-top: 20px;
    padding: 15px;
    font-size: 18px;
    font-weight: 800;
    border: none;
    border-radius: 14px;
    cursor: pointer;
}

.btn-paso1 {
    background: linear-gradient(135deg,#c8a24a,#f5d27a);
    color: #1a1a1a;
}

.btn-paso2 {
    background: linear-gradient(135deg,#25D366,#128C7E);
    color: white;
}

.hidden { display:none; }
</style>
</head>

<body class="pago-body">

<div class="pago-card">

<h2 class="pago-titulo">Finalizar Pedido</h2>
<p class="pago-subtitulo">Dolce Tropea 🍦</p>

<!-- RESUMEN -->
<div class="resumen-caja">
    <p>Código: <span id="resumen-id" class="badge-pedido">-</span></p>
    <p>Cliente: <span id="resumen-cliente">-</span></p>
    <p>Entrega: <span id="resumen-entrega">-</span></p>
    <h3 class="total-monto">$<span id="resumen-total">0</span></h3>
</div>

<!-- METODOS -->
<div class="metodos-lista">

<label class="metodo-item">
    <input type="radio" name="metodo-pago" value="Transferencia" checked>
    🏦 Transferencia Bancaria
</label>

<label class="metodo-item">
    <input type="radio" name="metodo-pago" value="MercadoPago">
    📱 Mercado Pago
</label>

</div>

<!-- INFO PAGO -->
<div class="info-pago-dinamica">

<div id="contenido-transferencia">
    <div class="datos-banco">
        <p><b>CBU:</b> <span id="cbu-texto">0070123420000012345678</span></p>
        <p><b>Alias:</b> <span id="alias-texto">omi.23</span></p>
    </div>

    <button class="btn-copiar" onclick="copiarDatos()">
        📋 Copiar datos
    </button>
</div>

<div id="contenido-mercadopago" class="hidden">
    <p>⚡ Serás redirigido a Mercado Pago en el Paso 1</p>
</div>

</div>

<!-- BOTONES -->
<button id="btnPaso1" class="btn-paso1" onclick="paso1()">
1. Copiar Datos de Transferencia
</button>

<button id="btnPaso2" class="btn-paso2 hidden" onclick="confirmarYEnviar()">
2. ¡Ya pagué! Enviar pedido por WhatsApp
</button>

</div>

<script>
let datosPedido = JSON.parse(localStorage.getItem("pedido_pendiente_pago"));

if (!datosPedido) {
    alert("No hay pedido");
    window.location.href = "index.html";
}

/* RENDER */
document.getElementById("resumen-id").innerText = datosPedido.idPedido;
document.getElementById("resumen-cliente").innerText =
datosPedido.cliente.nombre + " " + datosPedido.cliente.apellido;

document.getElementById("resumen-entrega").innerText =
datosPedido.entrega.tipo === "delivery"
? datosPedido.entrega.direccion
: "Retiro en local";

document.getElementById("resumen-total").innerText = datosPedido.total;

/* COPIAR */
function copiarDatos() {
const cbu = document.getElementById("cbu-texto").innerText;
const alias = document.getElementById("alias-texto").innerText;
navigator.clipboard.writeText(`CBU: ${cbu}\nAlias: ${alias}`);
alert("Datos copiados");
}

/* ===== 🔥 NUEVO: DETECCIÓN DE CAMBIO ===== */
const btnPaso1 = document.getElementById("btnPaso1");

document.querySelectorAll('input[name="metodo-pago"]').forEach(radio => {
    radio.addEventListener("change", function () {

        const esTransferencia = this.value === "Transferencia";

        document.getElementById("contenido-transferencia")
            .classList.toggle("hidden", !esTransferencia);

        document.getElementById("contenido-mercadopago")
            .classList.toggle("hidden", esTransferencia);

        /* CAMBIO DINÁMICO DEL BOTÓN */
        btnPaso1.innerText = esTransferencia
            ? "1. Copiar Datos de Transferencia"
            : "1. Ir a pagar a Mercado Pago";
    });
});

/* PASO 1 */
function paso1() {

const metodo = document.querySelector('input[name="metodo-pago"]:checked').value;

if (metodo === "Transferencia") {
    copiarDatos();
    alert("Realizá el pago y luego continuá");
} else {
    window.open("https://link.mercadopago.com.ar/dolcetropea", "_blank");
}

/* avanzar flujo */
document.getElementById("btnPaso1").classList.add("hidden");
document.getElementById("btnPaso2").classList.remove("hidden");
}

/* MENSAJE WHATSAPP */
function armarTextoPedido() {

let metodo = document.querySelector('input[name="metodo-pago"]:checked').value;

let m = `🍦 *DOLCE TROPEA - PEDIDO ${datosPedido.idPedido}* 🍦\n\n`;
m += `👤 Cliente: ${datosPedido.cliente.nombre} ${datosPedido.cliente.apellido}\n`;
m += `📍 Entrega: ${datosPedido.entrega.direccion || "Retiro en local"}\n`;
m += `💳 Pago: ${metodo}\n\n`;
m += `🛒 PRODUCTOS:\n\n`;

datosPedido.productos.forEach(p => {
    m += `• *${p.nombre}*\n`;

    if (p.gustos && p.gustos.length > 0) {
        const gustos = p.gustos.filter(g => g.trim() !== "");
        if (gustos.length > 0) {
            m += `  🍨 Sabores: ${gustos.join(", ")}\n`;
        }
    }
});

m += `\n💰 TOTAL: $${datosPedido.total}`;
return m;
}

/* PASO 2 */
function confirmarYEnviar() {

const mensaje = armarTextoPedido();
const telefono = "5492975148986";

/* limpiar primero */
localStorage.removeItem("carrito");
localStorage.removeItem("pedido_pendiente_pago");

window.location.href =
`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;
}
</script>

</body>
</html>
