<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finalizar Pedido - Dolce Tropea</title>

<link rel="stylesheet" href="styles_2.css">

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Roboto, Arial, sans-serif;
    background: #0f0f12;
    color: #eaeaea;
}

.pago-body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1a1a1a, #0f0f12 70%);
    padding: 20px;
}

.pago-card {
    width: 100%;
    max-width: 480px;
    background: #1b1b1f;
    border-radius: 18px;
    padding: 25px;
    border: 1px solid rgba(255,255,255,0.05);
}

.pago-titulo {
    text-align: center;
    font-size: 28px;
    font-weight: 800;
}

.pago-subtitulo {
    text-align: center;
    color: #b5b5b5;
}

.resumen-caja {
    background: #141418;
    padding: 15px;
    border-radius: 12px;
    margin: 15px 0;
}

.badge-pedido {
    background: linear-gradient(135deg,#c8a24a,#f5d27a);
    color: #1a1a1a;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: bold;
}

.total-monto {
    font-size: 26px;
    font-weight: 900;
}

.metodos-lista {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.metodo-item {
    background: #15151a;
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.2s;
}

.metodo-item:hover {
    border-color: #c8a24a;
    transform: scale(1.02);
}

.info-pago-dinamica {
    margin-top: 15px;
}

.datos-banco {
    background: #111114;
    padding: 15px;
    border-radius: 12px;
    border: 1px dashed rgba(255,255,255,0.15);
}

.btn-copiar {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg,#c8a24a,#f5d27a);
    font-weight: bold;
    cursor: pointer;
}

.btn-confirmar-pedido {
    width: 100%;
    margin-top: 20px;
    padding: 15px;
    font-size: 18px;
    font-weight: 800;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg,#c8a24a,#f5d27a);
    cursor: pointer;
}

.payment-loading {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.loading-card {
    background: #1b1b1f;
    padding: 25px;
    border-radius: 16px;
    text-align: center;
    width: 280px;
}

.spinner {
    width: 45px;
    height: 45px;
    border: 4px solid #333;
    border-top: 4px solid #c8a24a;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.hidden { display:none; }
</style>
</head>

<body class="pago-body">

<div class="pago-card">

<h2 class="pago-titulo">Finalizar Pedido</h2>
<p class="pago-subtitulo">Dolce Tropea 🍦</p>

<!-- RESUMEN -->
<div class="resumen-caja">
    <p>Código: <span id="resumen-id" class="badge-pedido">-</span></p>
    <p>Cliente: <span id="resumen-cliente">-</span></p>
    <p>Entrega: <span id="resumen-entrega">-</span></p>
    <h3 class="total-monto">$<span id="resumen-total">0</span></h3>
</div>

<!-- METODOS -->
<div class="metodos-lista">

<label class="metodo-item">
    <input type="radio" name="metodo-pago" value="Transferencia" checked>
    🏦 Transferencia Bancaria
</label>

<label class="metodo-item">
    <input type="radio" name="metodo-pago" value="MercadoPago">
    📱 Mercado Pago
</label>

</div>

<!-- DETALLES DINAMICOS -->
<div class="info-pago-dinamica">

<div id="contenido-transferencia">
    <div class="datos-banco">
        <p><b>Banco:</b> Galicia</p>
        <p><b>CBU:</b> <span id="cbu-texto">0070123420000012345678</span></p>
        <p><b>Alias:</b> <span id="alias-texto">omi.23</span></p>
    </div>

    <button class="btn-copiar" onclick="copiarDatos()">
        📋 Copiar datos
    </button>
</div>

<div id="contenido-mercadopago" class="hidden">
    <p>⚡ Te enviaremos el link por WhatsApp</p>
</div>

</div>

<button class="btn-confirmar-pedido" onclick="confirmarYEnviar()">
Enviar pedido por WhatsApp
</button>

</div>

<!-- LOADING -->
<div id="payment-loading" class="payment-loading hidden">
<div class="loading-card">
<div class="spinner"></div>
<p>Procesando...</p>
</div>
</div>

<script>
/* =========================
   PEDIDO
========================= */
let datosPedido = JSON.parse(localStorage.getItem("pedido_pendiente_pago"));

if (!datosPedido) {
    alert("No hay pedido");
    window.location.href = "index.html";
}

/* =========================
   RENDER
========================= */
document.getElementById("resumen-id").innerText = datosPedido.idPedido;
document.getElementById("resumen-cliente").innerText =
datosPedido.cliente.nombre + " " + datosPedido.cliente.apellido;

document.getElementById("resumen-entrega").innerText =
datosPedido.entrega.tipo === "delivery"
? datosPedido.entrega.direccion
: "Retiro en local";

document.getElementById("resumen-total").innerText = datosPedido.total;

/* =========================
   CAMBIO METODO PAGO
========================= */
document.querySelectorAll('input[name="metodo-pago"]').forEach(r => {
r.addEventListener("change", function () {
    let esT = this.value === "Transferencia";
    document.getElementById("contenido-transferencia").classList.toggle("hidden", !esT);
    document.getElementById("contenido-mercadopago").classList.toggle("hidden", esT);
});
});

/* =========================
   COPIAR DATOS
========================= */
function copiarDatos() {
const cbu = document.getElementById("cbu-texto").innerText;
const alias = document.getElementById("alias-texto").innerText;

navigator.clipboard.writeText(`CBU: ${cbu}\nAlias: ${alias}`);
alert("Datos copiados");
}

/* =========================
   MENSAJE WHATSAPP (CORREGIDO COMPLETO)
========================= */
function armarTextoPedido() {

let metodo = document.querySelector('input[name="metodo-pago"]:checked').value;

let m = `🍦 *DOLCE TROPEA - PEDIDO ${datosPedido.idPedido}* 🍦\n\n`;
m += `👤 Cliente: ${datosPedido.cliente.nombre} ${datosPedido.cliente.apellido}\n`;
m += `📍 Entrega: ${datosPedido.entrega.direccion || "Retiro en local"}\n`;
m += `💳 Pago: ${metodo}\n\n`;
m += `🛒 PRODUCTOS:\n\n`;

/* 🔥 ESTE ERA EL PUNTO QUE TE FALTABA */
datosPedido.productos.forEach(p => {
    m += `• *${p.nombre}*\n`;

    if (p.gustos && p.gustos.length > 0) {
        const gustos = p.gustos.filter(g => g.trim() !== "");
        if (gustos.length > 0) {
            m += `  🍨 Sabores: ${gustos.join(", ")}\n`;
        }
    }
});

m += `\n💰 TOTAL: $${datosPedido.total}`;
return m;
}

/* =========================
   CONFIRMAR Y ENVIAR (CORREGIDO)
========================= */
function confirmarYEnviar() {

document.getElementById("payment-loading")
.classList.remove("hidden");

const mensaje = armarTextoPedido();
const telefono = "5492975148986";

const url = `https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;

/* 🔥 FIX IMPORTANTE: limpiar ANTES de redirigir */
localStorage.removeItem("carrito");
localStorage.removeItem("pedido_pendiente_pago");

/* abrir whatsapp */
window.location.href = url;
}
</script>

</body>
</html>
